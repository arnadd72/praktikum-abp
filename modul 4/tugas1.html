<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Formulir Pendaftaran Praktikan</title>
  
  <style>
    body {
      background-color: hsl(200, 40%, 90%); 
      font-family: Arial, sans-serif;
    }
    
    .container {
      background-color: rgba(255, 255, 255, 0.95);
      width: 450px;
      margin: 40px auto;
      padding: 20px 30px;
      border: 1px solid #ccc;
      box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
    }
    
    h3 {
      text-align: left;
      margin-bottom: 20px;
      font-weight: bold;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    td {
      padding: 6px 0;
      vertical-align: top;
      font-size: 14px;
    }
    
    input[type="text"], 
    input[type="password"], 
    input[type="email"], 
    select, 
    textarea {
      width: 95%;
      padding: 4px;
      border: 1px solid #a9a9a9;
    }
    
    .btn-submit {
      background-color: tomato;
      color: white;
      font-weight: bold;
      border: 1px solid #000;
      padding: 4px 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="container">
    <h3>Formulir Pendaftaran Praktikan</h3>
    
    <form action="#" method="POST">
      <table>
        
        <tr>
          <td width="35%">Nama</td>
          <td width="5%">:</td>
          <td>
            <input type="text" name="nama" 
                   value="" required>
          </td>
        </tr>

        <tr>
          <td>NIM</td>
          <td>:</td>
          <td>
            <input type="text" name="nim" 
                   value="" required>
          </td>
        </tr>

        <tr>
          <td>Username</td>
          <td>:</td>
          <td>
            <input type="text" name="username" 
                   value="Praktikum" required>
          </td>
        </tr>

        <tr>
          <td>Password</td>
          <td>:</td>
          <td>
            <input type="password" name="password" 
                   value="12345678" required>
          </td>
        </tr>

        <tr>
          <td>Email</td>
          <td>:</td>
          <td>
            <input type="email" name="email" 
                   placeholder="Input Email" required>
          </td>
        </tr>

        <tr>
          <td>Jenis Kelamin</td>
          <td>:</td>
          <td>
            <input type="radio" name="jk" value="Pria"> Pria 
            <input type="radio" name="jk" value="Wanita" checked> Wanita
          </td>
        </tr>

        <tr>
          <td>Hobi</td>
          <td>:</td>
          <td>
            <input type="checkbox" name="hobi1" value="Renang" checked> Renang 
            <br>
            <input type="checkbox" name="hobi2" value="Bersepeda"> Bersepeda 
            <br>
            <input type="checkbox" name="hobi3" value="Memancing" checked> 
            Memancing
          </td>
        </tr>

        <tr>
          <td>Jenjang Pendidikan</td>
          <td>:</td>
          <td>
            <select name="pendidikan">
              <option value="">------Pilih------</option>
              <option value="D3">Tamat D3</option>
              <option value="S1">Tamat S1</option>
              <option value="S2">Tamat S2</option>
              <option value="S3">Tamat S3</option>
            </select>
          </td>
        </tr>

        <tr>
          <td>Kritik & Saran</td>
          <td>:</td>
          <td>
            <textarea name="kritik_saran" rows="3"></textarea>
          </td>
        </tr>

        <tr>
          <td colspan="3" style="text-align: right; padding-top: 15px;">
            <button type="reset">Cancel</button>
            <button type="submit" class="btn-submit">Submit</button>
          </td>
        </tr>

      </table>
    </form>
  </div>

</body>
</html>
