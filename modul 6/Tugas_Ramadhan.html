<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Sambut Kemenangan - Spesial Idul Fitri</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
          rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" 
          rel="stylesheet">
          
    <style>
        /* Mengubah warna background menjadi soft blue */
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #e0f2fe; 
        }
        
        .hero-section {
            /* Mengubah warna overlay gradien menjadi Navy Blue/Gelap */
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), 
                        url('https://images.unsplash.com/photo-1564120282405-f3702170868f?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            height: 100vh;
            color: #f8fafc; 
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        /* Modifikasi warna tombol menjadi Emas (Gold) yang elegan */
        #btn-thr { 
            transition: transform 0.3s; 
            background-color: #fbbf24;
            color: #1e3a8a; /* Teks biru gelap agar kontras dan mudah dibaca */
            border: none;
        }
        
        #btn-thr:hover { 
            transform: scale(1.1); 
            background-color: #f59e0b; /* Warna emas lebih gelap saat di-hover */
        }
        
        /* Class tambahan untuk mengubah warna bawaan Bootstrap secara aman */
        .modal-header-custom {
            background-color: #1e40af; /* Warna Navy Blue */
            color: white;
        }
        
        .text-custom {
            color: #1e40af !important;
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="container">
            <h1 class="display-3 fw-bold mb-3">
                Selamat Menyambut <br> Hari Raya Idul Fitri
            </h1>
            <p class="lead mb-5">
                Mari saling memaafkan dan kembali fitrah di hari yang suci ini.
            </p>
            
            <button id="btn-thr" class="btn btn-lg fw-bold px-5 py-3 shadow">
                ✨ BUKA BINGKISAN LEBARAN! ✨
            </button>
        </div>
    </div>

    <div class="modal fade" id="modalThr" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center border-0 shadow-lg">
                
                <div class="modal-header modal-header-custom justify-content-center">
                    <h5 class="modal-title">🎊 BINGKISAN SPESIAL! 🎊</h5>
                </div>
                
                <div class="modal-body py-5">
                    <h2 class="text-custom fw-bold">Alhamdulillah!</h2>
                    <p class="fs-5">
                        Anda berhak menerima <strong>Parsel Eksklusif Lebaran</strong>
                    </p>
                    <div class="display-1">🎁</div>
                </div>
                
                <div class="modal-footer justify-content-center">
                    <button type="button" class="btn btn-outline-dark" data-bs-dismiss="modal">
                        Tutup Pesan
                    </button>
                </div>
                
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
    </script>
    
    <script>
        // Logika jQuery murni 100% tidak dirubah sesuai instruksi
        $(document).ready(function() {
            $("#btn-thr").click(function() {
                var myModal = new bootstrap.Modal(document.getElementById('modalThr'));
                myModal.show();
            });
        });
    </script>
</body>
</html>
